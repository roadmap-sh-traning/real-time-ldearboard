services:
  postgres:
    image: postgres:16-alpine
    container_name: real-time-lb-pg
    restart: unless-stopped
    environment:
      POSTGRES_DB: real-time-lb
      POSTGRES_USER: real-time-lb
      POSTGRES_PASSWORD: real-time-lb
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U real-time-lb -d real-time-lb"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
