services:
  app:
    build: .
    container_name: real-time-lb-app
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432

      REDIS_HOST: redis
      REDIS_PORT: 6379

    volumes:
      - .:/app

  postgres:
    image: postgres:16-alpine
    container_name: real-time-lb-pg
    restart: unless-stopped
    environment:
      POSTGRES_DB: real-time-lb
      POSTGRES_USER: real-time-lb
      POSTGRES_PASSWORD: real-time-lb
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: real-time-lb-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes

volumes:
  postgres_data:
  redis_data:
