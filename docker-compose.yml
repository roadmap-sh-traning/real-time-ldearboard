services:
  app:
    build: .
    container_name: real-time-lb-app
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://real-time-lb:real-time-lb@postgres:5432/real-time-lb
      JWT_SECRET: ${JWT_SECRET:-super-secret-key}
      REDIS_HOST: redis
      REDIS_PORT: 6379
    volumes:
      # Use locally built client (npm run client:build) without rebuilding the image
      - ./public:/app/public

  postgres:
    image: postgres:16-alpine
    container_name: real-time-lb-pg
    restart: unless-stopped
    environment:
      POSTGRES_DB: real-time-lb
      POSTGRES_USER: real-time-lb
      POSTGRES_PASSWORD: real-time-lb
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U real-time-lb -d real-time-lb"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: real-time-lb-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  postgres_data:
  redis_data:
