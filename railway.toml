# Railway config-as-code for the app service.
# Docs: https://docs.railway.com/config-as-code

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
# Uses compiled migrator (drizzle-kit is dev-only and not in the prod image).
preDeployCommand = ["node dist/scripts/migrate.js"]
startCommand = "npx fastify start -l info -p ${PORT:-3000} dist/app.js"
healthcheckPath = "/status"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
